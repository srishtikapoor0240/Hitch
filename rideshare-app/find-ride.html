<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitch — Find a Ride</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ─── Header ─── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: rgba(8,9,13,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }
    .top-logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .top-logo span { color: var(--orange); }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px 14px 4px 4px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .user-pill:hover { border-color: var(--border-hov); }
    .user-pill-email { font-size: 12px; color: var(--txt-2); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ─── Content ─── */
    .content { padding: 72px 0 80px; }

    /* ─── Filter bar ─── */
    .filter-section {
      padding: 16px 16px 0;
    }
    .filter-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--txt-3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .filter-grid .form-group { margin: 0; }
    .filter-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .filter-row .form-group { flex: 1; margin: 0; }
    .filter-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    /* ─── Results header ─── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 16px 12px;
    }
    .results-header h2 {
      font-size: 18px;
      font-weight: 700;
    }
    .results-count {
      font-size: 12px;
      color: var(--txt-3);
    }

    /* ─── Ride Card ─── */
    .rides-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ride-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.35s ease both;
    }
    .ride-card:hover { border-color: var(--border-hov); transform: translateY(-1px); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ride-route {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .route-point {
      flex: 1;
      min-width: 0;
    }
    .route-label { font-size: 10px; color: var(--txt-3); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
    .route-city  { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .route-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--orange);
      flex-shrink: 0;
    }
    .route-line {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, var(--border), var(--orange), var(--border));
    }

    .ride-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--txt-2);
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px 10px;
    }
    .meta-chip svg { width: 12px; height: 12px; color: var(--txt-3); }

    .ride-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .poster-info {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .poster-email {
      font-size: 12px;
      color: var(--txt-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }

    .seats-bar {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .seat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .seat-dot.filled { background: var(--orange); }
    .seat-dot.empty  { background: var(--border); }

    /* ─── Skeletons ─── */
    .skeleton-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .sk { margin-bottom: 10px; }

    /* ─── Interest btn states ─── */
    .btn-interested {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.3);
    }
    .btn-own-ride {
      background: var(--blue-dim);
      color: var(--blue);
      border: 1px solid rgba(59,130,246,0.2);
      cursor: default;
    }
  </style>
</head>
<body>
  <div id="toast-container"></div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-logo">Hi<span>tc</span>h</div>
    <div class="user-pill" onclick="handleLogout()">
      <div class="avatar" id="user-avatar">?</div>
      <span class="user-pill-email" id="user-email">Loading...</span>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Filters -->
    <div class="filter-section">
      <div class="filter-title">Filter Rides</div>
      <div class="filter-grid">
        <div class="form-group">
          <label class="form-label">From</label>
          <input type="text" id="filter-from" class="form-input" placeholder="Origin" />
        </div>
        <div class="form-group">
          <label class="form-label">To</label>
          <input type="text" id="filter-to" class="form-input" placeholder="Destination" />
        </div>
      </div>
      <div class="filter-row">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" id="filter-date" class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label">Gender Pref</label>
          <select id="filter-gender" class="form-select">
            <option value="">Any</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn btn-primary btn-sm" onclick="loadRides()" style="flex:1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search
        </button>
        <button class="btn btn-outline btn-sm" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <!-- Results -->
    <div class="results-header">
      <h2>Available Rides</h2>
      <span class="results-count" id="results-count"></span>
    </div>

    <div class="rides-list" id="rides-list">
      <!-- Skeletons -->
      <div class="skeleton-card">
        <div class="skeleton sk" style="height:18px;width:60%"></div>
        <div class="skeleton sk" style="height:14px;width:40%"></div>
        <div class="skeleton sk" style="height:14px;width:80%"></div>
        <div class="skeleton" style="height:38px;width:100%"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton sk" style="height:18px;width:55%"></div>
        <div class="skeleton sk" style="height:14px;width:35%"></div>
        <div class="skeleton sk" style="height:14px;width:75%"></div>
        <div class="skeleton" style="height:38px;width:100%"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="find-ride.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Find
    </a>
    <a class="nav-item" href="offer-ride.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Offer
    </a>
    <a class="nav-item" href="my-rides.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      My Rides
    </a>
  </nav>

  <script src="utils.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');

    // Set user info
    const email = getUserEmail();
    document.getElementById('user-email').textContent = email;
    document.getElementById('user-avatar').textContent = initials(email);

    // Firebase token refresh
    async function getFirebaseToken() {
      return getToken(); // We'll refresh if needed
    }

    async function loadRides() {
      const date   = document.getElementById('filter-date').value;
      const gender = document.getElementById('filter-gender').value;
      const from   = document.getElementById('filter-from').value.trim();
      const to     = document.getElementById('filter-to').value.trim();

      const list = document.getElementById('rides-list');
      list.innerHTML = `
        <div class="skeleton-card"><div class="skeleton sk" style="height:18px;width:60%"></div><div class="skeleton sk" style="height:14px;width:80%"></div><div class="skeleton" style="height:38px"></div></div>
        <div class="skeleton-card"><div class="skeleton sk" style="height:18px;width:50%"></div><div class="skeleton sk" style="height:14px;width:70%"></div><div class="skeleton" style="height:38px"></div></div>
      `;

      try {
        const params = new URLSearchParams();
        if (date)   params.set('date', date);
        if (gender) params.set('gender', gender);

        let rides = await apiFetch(`/rides?${params}`);

        // Client-side filter for from/to (backend doesn't support text search)
        if (from) rides = rides.filter(r => r.from?.toLowerCase().includes(from.toLowerCase()));
        if (to)   rides = rides.filter(r => r.to?.toLowerCase().includes(to.toLowerCase()));

        document.getElementById('results-count').textContent =
          rides.length > 0 ? `${rides.length} ride${rides.length>1?'s':''} found` : '';

        if (rides.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
              <h3>No rides found</h3>
              <p>Try changing your filters or check back later</p>
            </div>`;
          return;
        }

        const myUid = getUserId();
        list.innerHTML = '';
        rides.forEach((ride, i) => {
          const card = document.createElement('div');
          card.className = 'ride-card';
          card.style.animationDelay = `${i * 0.06}s`;

          const isOwn       = ride.postedBy === myUid;
          const isInterested = ride.interestedUsers?.includes(myUid);
          const isConfirmed  = ride.confirmedUsers?.includes(myUid);

          let btnHtml = '';
          if (isOwn) {
            btnHtml = `<button class="btn btn-sm btn-own-ride" disabled>Your Ride</button>`;
          } else if (isConfirmed) {
            btnHtml = `<button class="btn btn-sm btn-interested" disabled>✓ Confirmed</button>`;
          } else if (isInterested) {
            btnHtml = `<button class="btn btn-sm btn-interested" disabled>✓ Interested</button>`;
          } else {
            btnHtml = `<button class="btn btn-sm btn-ghost" onclick="showInterest('${ride.id}', this)">I'm Interested</button>`;
          }

          // Seats display
          const total   = ride.totalSeats || 1;
          const left    = ride.seatsLeft ?? total;
          const taken   = total - left;
          const seatDots = Array.from({length: total}, (_, i) =>
            `<div class="seat-dot ${i < taken ? 'filled' : 'empty'}"></div>`
          ).join('');

          const modeIcon = ride.mode === 'cab'
            ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>`
            : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>`;

          card.innerHTML = `
            <div class="ride-route">
              <div class="route-point">
                <div class="route-label">From</div>
                <div class="route-city">${ride.from || '—'}</div>
              </div>
              <div class="route-arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </div>
              <div class="route-point" style="text-align:right">
                <div class="route-label">To</div>
                <div class="route-city">${ride.to || '—'}</div>
              </div>
            </div>

            <div class="ride-meta">
              <span class="meta-chip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${formatDate(ride.date)}
              </span>
              <span class="meta-chip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                ${ride.timeRange || '—'}
              </span>
              <span class="meta-chip">
                ${modeIcon}
                ${ride.mode || '—'}
              </span>
              ${ride.genderPreference && ride.genderPreference !== 'any'
                ? `<span class="meta-chip">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    ${ride.genderPreference} only
                   </span>` : ''}
            </div>

            <div class="ride-footer">
              <div class="poster-info">
                <div class="avatar">${initials(ride.posterEmail || ride.postedBy)}</div>
                <div>
                  <div class="poster-email">${ride.posterEmail || 'Student'}</div>
                  <div class="seats-bar">${seatDots}<span style="font-size:11px;color:var(--txt-3);margin-left:6px">${left} left</span></div>
                </div>
              </div>
              ${btnHtml}
            </div>
          `;
          list.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        list.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <h3>Failed to load rides</h3>
            <p>${err.message}</p>
          </div>`;
        showToast(err.message, 'error');
      }
    }

    window.showInterest = async function(rideId, btn) {
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';
      try {
        await apiFetch(`/rides/${rideId}/interest`, { method: 'POST' });
        btn.className = 'btn btn-sm btn-interested';
        btn.textContent = '✓ Interested';
        showToast('Interest marked! The owner will confirm you.', 'success');
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "I'm Interested";
        showToast(err.message, 'error');
      }
    };

    window.clearFilters = function() {
      document.getElementById('filter-date').value   = '';
      document.getElementById('filter-gender').value = '';
      document.getElementById('filter-from').value   = '';
      document.getElementById('filter-to').value     = '';
      loadRides();
    };

    window.handleLogout = function() {
      if (confirm('Sign out of Hitch?')) {
        clearAuth();
        window.location.href = 'login.html';
      }
    };

    loadRides();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitch — Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ─── Background pattern ─── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(249,115,22,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }
    .bg-blob {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(249,115,22,0.08) 0%, transparent 70%);
      top: -100px; right: -100px;
      pointer-events: none;
    }
    .bg-blob-2 {
      position: fixed;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(59,130,246,0.06) 0%, transparent 70%);
      bottom: -50px; left: -80px;
      pointer-events: none;
    }

    /* ─── Layout ─── */
    .login-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 24px;
      max-width: 440px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* ─── Logo area ─── */
    .logo-area {
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease both;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: var(--orange);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px var(--orange-glow);
    }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .headline {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .headline span { color: var(--orange); }
    .subtext {
      color: var(--txt-2);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ─── Form card ─── */
    .login-card {
      animation: fadeUp 0.6s ease 0.15s both;
    }
    .form-footer {
      margin-top: 20px;
      text-align: center;
      color: var(--txt-3);
      font-size: 13px;
    }
    .form-footer a {
      color: var(--orange);
      text-decoration: none;
      font-weight: 600;
    }

    /* ─── Error ─── */
    .error-msg {
      background: var(--red-dim);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    /* ─── Tab switcher ─── */
    .tab-bar {
      display: flex;
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--txt-3);
      letter-spacing: 0.01em;
    }
    .tab.active {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 2px 8px var(--orange-glow);
    }

    /* ─── Divider with text ─── */
    .divider-text {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--txt-3);
      font-size: 12px;
      margin: 20px 0;
    }
    .divider-text::before, .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Register fields ─── */
    .register-only { display: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .password-wrap {
      position: relative;
    }
    .password-wrap .form-input { padding-right: 44px; }
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--txt-3);
      display: flex;
      padding: 4px;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--txt); }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-blob"></div>
  <div class="bg-blob-2"></div>
  <div id="toast-container"></div>

  <div class="login-wrap">
    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-mark">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <rect x="9" y="11" width="14" height="10" rx="2" stroke="#fff" stroke-width="2"/>
            <circle cx="12" cy="21" r="1" fill="#fff"/>
            <circle cx="20" cy="21" r="1" fill="#fff"/>
          </svg>
        </div>
        <span class="logo-name">Hitch</span>
      </div>
      <h1 class="headline">Rides made for <span>students</span></h1>
      <p class="subtext">Share rides, split costs, travel together.</p>
    </div>

    <!-- Card -->
    <div class="login-card card">
      <!-- Tab bar -->
      <div class="tab-bar">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
      </div>

      <!-- Error -->
      <div class="error-msg" id="error-msg"></div>

      <!-- Name (register only) -->
      <div class="form-group register-only" id="name-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Your name" />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@college.edu" autocomplete="email" />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
          <button class="eye-btn" onclick="togglePassword()" type="button" id="eye-btn">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn btn-primary btn-full" id="submit-btn" onclick="handleSubmit()">
        <span id="btn-text">Sign In</span>
        <div class="spinner hidden" id="btn-spinner"></div>
      </button>

      <div class="divider-text">or continue with</div>

      <button class="btn btn-outline btn-full" onclick="handleGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="form-footer">
        <span id="footer-text">Don't have an account?</span>
        <a href="#" id="footer-link" onclick="switchTab('register'); return false;"> Register free</a>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyCGNLUG_MN5YDFaVKweACGFUdbMzN8xP4E",
      authDomain: "hitch-8d742.firebaseapp.com",
      projectId: "hitch-8d742",
      storageBucket: "hitch-8d742.firebasestorage.app",
      messagingSenderId: "29983465742",
      appId: "1:29983465742:web:31813fd04e5104fb22b75f"
    };

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);

    function setLoading(v) {
      document.getElementById('btn-spinner').classList.toggle('hidden', !v);
      document.getElementById('btn-text').style.opacity = v ? '0' : '1';
      document.getElementById('submit-btn').disabled = v;
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function clearError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    async function onSuccess(userCred) {
      const token = await userCred.user.getIdToken();
      localStorage.setItem('hitchToken',  token);
      localStorage.setItem('hitchUserId', userCred.user.uid);
      localStorage.setItem('hitchUserEmail', userCred.user.email || '');
      window.location.href = 'find-ride.html';
    }

    window.handleSubmit = async function () {
      clearError();
      const mode  = window._currentTab || 'login';
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      if (!email || !pass) { showError('Please fill in all fields.'); return; }

      setLoading(true);
      try {
        let cred;
        if (mode === 'login') {
          cred = await signInWithEmailAndPassword(auth, email, pass);
        } else {
          cred = await createUserWithEmailAndPassword(auth, email, pass);
        }
        await onSuccess(cred);
      } catch (err) {
        const msgs = {
          'auth/user-not-found': 'No account found with this email.',
          'auth/wrong-password': 'Incorrect password.',
          'auth/email-already-in-use': 'This email is already registered.',
          'auth/weak-password': 'Password should be at least 6 characters.',
          'auth/invalid-email': 'Please enter a valid email.',
          'auth/invalid-credential': 'Invalid email or password.',
        };
        showError(msgs[err.code] || err.message);
      } finally {
        setLoading(false);
      }
    };

    window.handleGoogleLogin = async function () {
      clearError();
      const provider = new GoogleAuthProvider();
      try {
        const cred = await signInWithPopup(auth, provider);
        await onSuccess(cred);
      } catch (err) {
        showError(err.message);
      }
    };
  </script>

  <script>
    // Check already logged in
    if (localStorage.getItem('hitchToken')) {
      window.location.href = 'find-ride.html';
    }

    window._currentTab = 'login';

    window.switchTab = function(tab) {
      window._currentTab = tab;
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('btn-text').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
      document.getElementById('footer-text').textContent =
        tab === 'login' ? "Don't have an account?" : "Already have an account?";
      const footerLink = document.getElementById('footer-link');
      footerLink.textContent = tab === 'login' ? ' Register free' : ' Sign in';
      footerLink.onclick = (e) => { e.preventDefault(); switchTab(tab === 'login' ? 'register' : 'login'); };

      document.querySelectorAll('.register-only').forEach(el =>
        el.style.display = tab === 'register' ? 'flex' : 'none'
      );
      document.getElementById('error-msg').style.display = 'none';
    };

    window.togglePassword = function() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    };

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleSubmit();
    });
  </script>
</body>
</html>
